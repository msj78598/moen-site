name: Update external real estate offers

on:
  schedule:
    # 03:00 UTC = 06:00 in Jordan/Saudi Arabia for the current deployment timezone.
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-external-offers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update external offers
        run: npm run update:external-offers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_EXTERNAL_OFFERS: 36
          RUN_TIME_ZONE: Asia/Riyadh
